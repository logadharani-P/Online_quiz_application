<!DOCTYPE html>
<html>
<style>
    h2{
        text-align:center;
        font-family:fantasy;

    }
    th{
        color:rgb(6, 6, 24);
        font-weight:bold;
        padding:10px; width:200px;
        background-color: #f2f2f2;
        margin:auto;
        
    }
    body {
        background-color: rgb(88, 171, 226);
        
    }
</style>
<body>

<h2>Results</h2>

<table border="1" style="margin:auto;font-family:monospace">
  <tr>
    <th>Name</th>
    <th>Test</th>
    <th>Score</th>
  </tr>

  <tbody id="data"></tbody>
</table>
<script>
fetch("http://127.0.0.1:5000/results")
  .then(response => response.json())
  .then(data => {
    localStorage.setItem("results", JSON.stringify(data));
    load();
  });

function load() {


  let data = localStorage.getItem("results");

  console.log("Raw data:", data);

  let results = [];

  if (data) {
    results = JSON.parse(data);
  }

  let table = document.getElementById("data");
  table.innerHTML = "";

  if (results.length === 0) {
    table.innerHTML = "<tr><td colspan='3'>No Results Found</td></tr>";
    return;
  }

  results.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.test_name}</td>
        <td>${r.score}</td>
      </tr>
    `;
  });
}

load();

</script>

</body>
</html>
