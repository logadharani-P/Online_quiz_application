<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Application</title>

    
    <style>
        h2{
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
            text-decoration: rgb(209, 213, 218);
            color: aliceblue;

        }
        .div {
            text-align: center;
            justify-content: center;
            justify-items: center;
            background-clip: border-box;
            
        }
        .order{
            margin: auto;
            border: 25%;
            align-items: center;
            text-align: center;
            padding: 70px;width: 300px;
            box-sizing: content-box;
            position: relative;
            margin-top: 70px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("gradient-abstract-background-with-different-shapes_23-2149110297.avif");
            border: 1px solid #fee;
            border-radius: 12px;
        }
        button{
            background-color: rgb(31, 122, 23);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: aliceblue;
            border: 1px solid ;
            border-radius: 10px;
            
        }
        button:hover{
            background-color: rgb(166, 245, 245);
            color: black;
            cursor: pointer;
        }
        body {
            background-image: url("quiz.jpg");
            background-size: cover;
        }
        label {
            color: aliceblue;
        }
        input {
            border: 2px solid rgb(193, 224, 145);
            border-radius: 15px;
            padding: 7px; width: 170px;
        }
    </style>
     
</head>
<body>
    <div class="order">
        <hr>
        <h2>Online Quiz Application</h2><br>
        <label> Name </label><br><br>
        <input type="text" name="name" placeholder="Enter your name" ><br><br>
        <label> Email</label><br><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>
        <label> Password </label><br><br>
        <input type="password" name="password" placeholder="Enter your password"><br><br><br>
        <button href="dashboard.html">Submit</button>
        <hr>
    </div>
    
</body>
</html>
