<!DOCTYPE html>
<html lang="en">
<head>

    <title>Quiz</title>
    <style>
        body {
            background-image: url("quiz.jpg");
            background-size: cover;

        }
        .box{
            width: 250px;
            margin: 20px auto;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0,1);
            background-color: white;

        }
         .container {
            display:block;
         }
         .box img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;

         }  
        .searchbar {
            margin-top: 20px;
            text-align: center;
            outline: none;
            
        
        }
        .searchbar input {
            font-size: 15px;
            padding: 10px; width: 500px;
        }
        .box:hover{
            cursor: pointer;
            background-color: rgb(119, 121, 117);
        }
        
          </style>

          <script>
            function open0() {
                window.location.href="page0.html"
            }

            function open1(){

            }

            }

            }

                window.location.href="page4.html"
            }

            function open5() {
                window.location.href="page5.html"
            }
          </script>

    
</head>
<body>
    <div class="searchbar">
        <input type="search" placeholder="🔍search"><br><br>

    <div class="box" onclick="open5()">
